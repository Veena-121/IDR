<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&amp;display=swap');</style>
    <clipPath id="topFace"><polygon points="40,8 66,22 40,36 14,22"/></clipPath>
    <clipPath id="leftFace"><polygon points="14,22 40,36 40,64 14,50"/></clipPath>
    <clipPath id="rightFace"><polygon points="66,22 40,36 40,64 66,50"/></clipPath>
  </defs>

  <!-- cube faces -->
  <polygon points="40,8 66,22 40,36 14,22" fill="#FF5C00"/>
  <polygon points="14,22 40,36 40,64 14,50" fill="#1A1A1A"/>
  <polygon points="66,22 40,36 40,64 66,50" fill="#333333"/>

  <!-- circuit on top face -->
  <g clip-path="url(#topFace)" opacity="0.35">
    <line x1="22" y1="16" x2="32" y2="16" stroke="white" stroke-width="1"/>
    <line x1="32" y1="16" x2="32" y2="22" stroke="white" stroke-width="1"/>
    <line x1="32" y1="22" x2="48" y2="22" stroke="white" stroke-width="1"/>
    <line x1="48" y1="22" x2="48" y2="16" stroke="white" stroke-width="1"/>
    <line x1="48" y1="16" x2="56" y2="16" stroke="white" stroke-width="1"/>
    <circle cx="32" cy="16" r="1.5" fill="white"/>
    <circle cx="48" cy="22" r="1.5" fill="white"/>
  </g>

  <!-- circuit on left face -->
  <g clip-path="url(#leftFace)" opacity="0.55">
    <line x1="18" y1="38" x2="26" y2="38" stroke="#FF5C00" stroke-width="0.9"/>
    <line x1="26" y1="38" x2="26" y2="48" stroke="#FF5C00" stroke-width="0.9"/>
    <line x1="26" y1="48" x2="18" y2="48" stroke="#FF5C00" stroke-width="0.9"/>
    <circle cx="26" cy="38" r="1.2" fill="#FF5C00"/>
    <circle cx="18" cy="48" r="1.2" fill="#FF5C00"/>
  </g>

  <!-- circuit on right face -->
  <g clip-path="url(#rightFace)" opacity="0.55">
    <line x1="56" y1="38" x2="63" y2="38" stroke="#FF5C00" stroke-width="0.9"/>
    <line x1="63" y1="38" x2="63" y2="50" stroke="#FF5C00" stroke-width="0.9"/>
    <circle cx="63" cy="50" r="1.2" fill="#FF5C00"/>
    <circle cx="56" cy="38" r="1.2" fill="#FF5C00"/>
  </g>

  <!-- front edge in orange -->
  <line x1="40" y1="36" x2="40" y2="64" stroke="#FF5C00" stroke-width="2" stroke-linecap="round"/>

  <!-- text -->
  <text x="82" y="34" font-family="'Syne', 'Arial Black', sans-serif" font-weight="800" font-size="28" fill="#FF5C00" letter-spacing="3">IDR</text>
  <rect x="82" y="40" width="220" height="1.5" fill="#FF5C00" opacity="0.4"/>
  <text x="83" y="58" font-family="'Syne', Arial, sans-serif" font-weight="400" font-size="11" fill="#CCCCCC" letter-spacing="2.5">INSTITUTE OF DIGITAL RISK</text>
</svg>

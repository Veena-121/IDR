<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <clipPath id="top"><polygon points="40,8 66,22 40,36 14,22"/></clipPath>
    <clipPath id="left"><polygon points="14,22 40,36 40,64 14,50"/></clipPath>
    <clipPath id="right"><polygon points="66,22 40,36 40,64 66,50"/></clipPath>
  </defs>

  <!-- cube faces -->
  <polygon points="40,8 66,22 40,36 14,22" fill="#FF5C00"/>
  <polygon points="14,22 40,36 40,64 14,50" fill="#1A1A1A"/>
  <polygon points="66,22 40,36 40,64 66,50" fill="#333333"/>

  <!-- circuit on top face -->
  <g clip-path="url(#top)" opacity="0.35">
    <line x1="22" y1="16" x2="32" y2="16" stroke="white" stroke-width="1"/>
    <line x1="32" y1="16" x2="32" y2="22" stroke="white" stroke-width="1"/>
    <line x1="32" y1="22" x2="48" y2="22" stroke="white" stroke-width="1"/>
    <line x1="48" y1="22" x2="48" y2="16" stroke="white" stroke-width="1"/>
    <line x1="48" y1="16" x2="56" y2="16" stroke="white" stroke-width="1"/>
    <circle cx="32" cy="16" r="1.5" fill="white"/>
    <circle cx="48" cy="22" r="1.5" fill="white"/>
  </g>

  <!-- circuit on left face -->
  <g clip-path="url(#left)" opacity="0.6">
    <line x1="18" y1="38" x2="28" y2="38" stroke="#FF5C00" stroke-width="1"/>
    <line x1="28" y1="38" x2="28" y2="50" stroke="#FF5C00" stroke-width="1"/>
    <line x1="28" y1="50" x2="18" y2="50" stroke="#FF5C00" stroke-width="1"/>
    <circle cx="28" cy="38" r="1.5" fill="#FF5C00"/>
    <circle cx="18" cy="50" r="1.5" fill="#FF5C00"/>
  </g>

  <!-- circuit on right face -->
  <g clip-path="url(#right)" opacity="0.6">
    <line x1="54" y1="38" x2="62" y2="38" stroke="#FF5C00" stroke-width="1"/>
    <line x1="62" y1="38" x2="62" y2="52" stroke="#FF5C00" stroke-width="1"/>
    <circle cx="62" cy="52" r="1.5" fill="#FF5C00"/>
    <circle cx="54" cy="38" r="1.5" fill="#FF5C00"/>
  </g>

  <!-- front edge in orange -->
  <line x1="40" y1="36" x2="40" y2="64" stroke="#FF5C00" stroke-width="2.5" stroke-linecap="round"/>
</svg>
